events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Servir la web estática de Astro en la raíz
        location / {
            root /webroot/live;
            index index.html;
            try_files $uri $uri/ $uri.html =404;
        }

        # Ya no hacemos proxy al CMS desde aquí (se accede directamente por puerto 3000)
    }
}
