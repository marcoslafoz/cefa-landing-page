events {
    worker_connections 2048;
    multi_accept       on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Core performance ──────────────────────────────────────────────────────
    sendfile             on;
    tcp_nopush           on;
    tcp_nodelay          on;
    keepalive_timeout    65;
    server_tokens        off;          # hide nginx version
    client_max_body_size 2m;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upstream: Astro SSR node server ──────────────────────────────────────
    # Runs inside the orchestrator container on port 4321.
    upstream astro_ssr {
        server    orchestrator:4321;
        keepalive 16;
    }

    server {
        listen      80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────────
        # NOTE: add_header is NOT inherited when a child location block defines
        # its own add_header directives, so headers are repeated per location.
        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header X-Frame-Options         "SAMEORIGIN"                      always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection        "1; mode=block"                   always;

        # ── Immutable static assets (JS, CSS, fonts, images) ─────────────────
        # Astro appends content hashes to asset filenames, so a 1-year cache is safe.
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|avif|gif|ico)$ {
            root /webroot/live;
            expires   1y;
            add_header Cache-Control          "public, immutable"                  always;
            add_header X-Content-Type-Options "nosniff"                            always;
            add_header X-Frame-Options        "SAMEORIGIN"                         always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin"    always;
            access_log off;
            try_files  $uri =404;
        }

        # ── API endpoints → Astro SSR node server ────────────────────────────
        # The contact form (/api/contact) requires server-side rendering.
        # nginx proxies /api/* to the node process running inside the orchestrator.
        location /api/ {
            proxy_pass            http://astro_ssr;
            proxy_http_version    1.1;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_set_header      Connection        "";  # required for keepalive upstream
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    10s;
            # Security headers inherited from server block (no local add_header here)
        }

        # ── HTML pages ────────────────────────────────────────────────────────
        # Short cache so content updates propagate quickly after a publish.
        location / {
            root  /webroot/live;
            index index.html;
            try_files $uri $uri/ $uri.html =404;
            add_header Cache-Control          "public, max-age=60, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff"                             always;
            add_header X-Frame-Options        "SAMEORIGIN"                          always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
            add_header X-XSS-Protection       "1; mode=block"                       always;
        }
    }
}
