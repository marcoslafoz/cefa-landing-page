services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate-api
    ports:
      - "5005:5000"
    environment:
      - LT_LOAD_ONLY=es,en,de,pl
      - LT_UPDATE_MODELS=true
    volumes:
      - ./lt-data:/home/libretranslate/.local/share/argos-translate
    restart: unless-stopped
